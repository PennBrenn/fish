<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fishing World</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a4a2e">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d2b1a;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }

    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #ui-layer .interactive {
      pointer-events: auto;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d2b1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    #loading-screen h1 {
      font-size: 3rem;
      color: #4ade80;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    #loading-screen .loading-bar {
      width: 300px;
      height: 4px;
      background: #1a4a2e;
      border-radius: 2px;
      overflow: hidden;
    }

    #loading-screen .loading-bar-fill {
      width: 0%;
      height: 100%;
      background: #4ade80;
      transition: width 0.3s ease;
    }

    #loading-screen .loading-text {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      color: #6b9e7a;
    }

    #click-to-start {
      display: none;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #4ade80;
      color: #0d2b1a;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #click-to-start:hover {
      background: #22c55e;
    }

    /* Debug overlay */
    #debug-overlay {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.75);
      color: #0f0;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 50;
      display: none;
      min-width: 280px;
      line-height: 1.5;
      white-space: pre;
    }

    /* HUD elements */
    #hud-fps {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 14px;
      color: #4ade80;
      z-index: 20;
      display: none;
    }

    #hud-top-right {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 14px;
      color: #e0e0e0;
      text-align: right;
      z-index: 20;
    }

    #hud-bottom-left {
      position: absolute;
      bottom: 8px;
      left: 8px;
      z-index: 20;
    }

    #hud-bottom-right {
      position: absolute;
      bottom: 8px;
      right: 8px;
      z-index: 20;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      pointer-events: none;
    }

    /* Pause menu */
    #pause-menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 80;
    }

    #pause-menu h2 {
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #4ade80;
    }

    #pause-menu button {
      display: block;
      width: 200px;
      padding: 0.75rem;
      margin: 0.5rem 0;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid #4ade80;
      color: #4ade80;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #pause-menu button:hover {
      background: rgba(74, 222, 128, 0.3);
    }

    /* Settings panel */
    #settings-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      z-index: 90;
      overflow-y: auto;
    }

    #settings-panel .settings-content {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem 2rem;
    }

    #settings-panel h2 {
      font-size: 1.8rem;
      color: #4ade80;
      margin-bottom: 1.5rem;
    }

    #settings-panel h3 {
      font-size: 1.1rem;
      color: #6b9e7a;
      margin: 1.5rem 0 0.75rem;
      border-bottom: 1px solid #1a4a2e;
      padding-bottom: 0.25rem;
    }

    #settings-panel .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 0;
    }

    #settings-panel .setting-row label {
      color: #ccc;
      font-size: 0.9rem;
    }

    #settings-panel select,
    #settings-panel input[type="range"] {
      background: #1a4a2e;
      color: #fff;
      border: 1px solid #2d6b3f;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-size: 0.85rem;
    }

    #settings-panel input[type="range"] {
      width: 120px;
    }

    #settings-panel .back-btn {
      margin-top: 2rem;
      padding: 0.6rem 1.5rem;
      background: rgba(74, 222, 128, 0.15);
      border: 1px solid #4ade80;
      color: #4ade80;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }

    /* Save indicator */
    #save-indicator {
      position: absolute;
      bottom: 60px;
      right: 12px;
      color: #4ade80;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 20;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="ui-layer">
    <div id="crosshair"></div>
    <div id="hud-fps"></div>
    <div id="hud-top-right"></div>
    <div id="hud-bottom-left"></div>
    <div id="hud-bottom-right"></div>
    <div id="save-indicator">Saving...</div>
  </div>

  <div id="debug-overlay"></div>

  <div id="pause-menu" class="interactive">
    <h2>Paused</h2>
    <button id="btn-resume">Resume</button>
    <button id="btn-settings">Settings</button>
    <button id="btn-save">Save Game</button>
    <button id="btn-quit">Return to Menu</button>
  </div>

  <div id="settings-panel" class="interactive">
    <div class="settings-content">
      <h2>Settings</h2>
      <div id="settings-body"></div>
      <button class="back-btn" id="btn-settings-back">Back</button>
    </div>
  </div>

  <div id="loading-screen">
    <h1>Fishing World</h1>
    <div class="loading-bar">
      <div class="loading-bar-fill" id="loading-bar-fill"></div>
    </div>
    <p class="loading-text" id="loading-text">Loading...</p>
    <button id="click-to-start">Click to Start</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
